# yaml-language-server: $schema=https://ui5.github.io/cli/schema/ui5.yaml.json
specVersion: '4.0'
metadata:
  name: genres
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateVersionInfo
      configuration:
        archiveName: genres
        relativePaths: true
        additionalFiles:
          - xs-app.json
